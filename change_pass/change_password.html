<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Allocation - Change Password</title>
    <link rel="icon" href="../favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../main.css">
    <script src="ch_pass.js"></script>
</head>
<body>
    <h1>Student Project Allocation System</h1>
    
    <div style="text-align: center; margin-bottom: 15px; width: 100%; max-width: 480px; display: flex; justify-content: space-between; align-items: center;">
        <a href="#" id="backBtn" class="back shadow"><= Back</a>
        <a href="#" onclick="handleLogout()" class="log_out shadow">Logout</a>
    </div>

    <div style="text-align: center; margin-bottom: 10px;">
        <span id="user_display" style="font-weight: 600;"></span>
    </div>

    <form id="changePassForm" onsubmit="handleChangePassword(event)">
        <table align="center">
            <tr>
                <th colspan="2">Change Password</th>
            </tr>
            <tr>
                <td>Old Password:</td>
                <td><input type="password" id="old_pass" class="textbox" required></td>
            </tr>
            <tr>
                <td>New Password:</td>
                <td><input type="password" id="passwd" class="textbox" required></td>
            </tr>
            <tr>
                <td>Re-enter Password:</td>            
                <td><input type="password" id="re-passwd" class="textbox" required></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" class="button shadow" value="Change Password">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <div id="errorMsg" class="msg"></div>
                </td>
            </tr>
        </table>
    </form>

    <!-- Scripts -->
    <script src="../js/mock-db.js"></script>
    <script>
        const student = MockDB.getCurrentStudent();
        const faculty = MockDB.getCurrentFaculty();
        
        if (!student && !faculty) {
            window.location.href = '../index.html?msg=AUTHENTICATION REQUIRED';
        }

        const userDisplay = document.getElementById('user_display');
        const backBtn = document.getElementById('backBtn');

        if (student) {
            userDisplay.innerText = `Logged in: ${student.first_name} ${student.last_name} (${student.student_id})`;
            backBtn.href = '../student/index.html';
        } else if (faculty) {
            userDisplay.innerText = `Logged in: ${faculty.name} (${faculty.faculty_id})`;
            backBtn.href = '../admin/index.html';
        }

        function handleChangePassword(event) {
            event.preventDefault();
            
            const oldPass = document.getElementById('old_pass').value;
            const newPass = document.getElementById('passwd').value;
            const rePass = document.getElementById('re-passwd').value;
            const errorMsg = document.getElementById('errorMsg');

            if (newPass !== rePass) {
                errorMsg.innerText = "Passwords do not match.";
                errorMsg.style.color = "#ff6b6b";
                return;
            }

            if (student) {
                if (student.password !== oldPass) {
                    errorMsg.innerText = "Incorrect old password.";
                    errorMsg.style.color = "#ff6b6b";
                    return;
                }
                // Update in students database
                const students = MockDB.getStudents();
                const currentIdx = students.findIndex(s => s.student_id === student.student_id);
                if (currentIdx !== -1) {
                    students[currentIdx].password = newPass;
                    MockDB.setStudents(students);
                    // Update session
                    student.password = newPass;
                    localStorage.setItem('session_student', JSON.stringify(student));
                }
            } else if (faculty) {
                if (faculty.password !== oldPass) {
                    errorMsg.innerText = "Incorrect old password.";
                    errorMsg.style.color = "#ff6b6b";
                    return;
                }
                // Update in faculty database
                const facultyList = MockDB.getFaculty();
                const currentIdx = facultyList.findIndex(f => f.faculty_id === faculty.faculty_id);
                if (currentIdx !== -1) {
                    facultyList[currentIdx].password = newPass;
                    MockDB.setFaculty(facultyList);
                    // Update session
                    faculty.password = newPass;
                    localStorage.setItem('session_faculty', JSON.stringify(faculty));
                }
            }

            errorMsg.innerText = "Password changed successfully!";
            errorMsg.style.color = "#84fab0";
            
            setTimeout(() => {
                window.location.href = student ? '../student/index.html' : '../admin/index.html';
            }, 1500);
        }

        function handleLogout() {
            MockDB.logout();
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
