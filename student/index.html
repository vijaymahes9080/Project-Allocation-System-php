<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Allocation - Student Dashboard</title>
    <link rel="icon" href="../favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../main.css">
    <style>
        .dashboard-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
        }
        .panel-title {
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: #ffd8a8;
        }
        .member-list, .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .member-item, .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .project-item {
            cursor: grab;
        }
        .project-item:active {
            cursor: grabbing;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            width: auto;
            max-width: fit-content;
            display: inline-block;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .form-row input {
            flex: 1;
        }
    </style>
</head>
<body>
    <h1>Student Project Allocation System</h1>
    
    <div style="text-align: center; margin-bottom: 15px; width: 100%; max-width: 800px;">
        <h3>
            Student ID: <span id="span_id"></span> &emsp; 
            Name: <span id="span_name"></span> &emsp; 
            CPI: <span id="span_cpi"></span>
        </h3>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
            <a href="#" onclick="handleLogout()" class="log_out shadow">Logout</a>
            <a href="../change_pass/change_password.html" style="align-self: center;">Change Password</a>
        </div>
    </div>

    <div class="msg" id="globalMsg"></div>

    <div class="dashboard-container">
        <!-- Group Management Panel -->
        <div class="panel">
            <div class="panel-title">My Group Info</div>
            <div id="groupState">
                <!-- Will be populated dynamically -->
            </div>
            
            <div style="margin-top: 20px;">
                <h4>Manage Group Members</h4>
                <div class="form-row">
                    <input type="text" id="newMemberId" class="textbox" placeholder="Partner Student ID">
                    <button onclick="addMember()" class="button btn-sm">Add</button>
                </div>
            </div>
        </div>

        <!-- Project Selection Panel -->
        <div class="panel">
            <div class="panel-title">Project Preferences (Drag / Reorder)</div>
            <div style="font-size: 0.85rem; margin-bottom: 10px; opacity: 0.8;">
                Add available projects to prioritize them. Drag list items to reorder priority.
            </div>
            <ul id="selectedProjects" class="project-list">
                <!-- Selected projects list -->
            </ul>
            
            <div style="margin-top: 20px;">
                <h4>Available Projects</h4>
                <select id="availProjectsDropdown" class="textbox" style="margin-bottom: 10px;">
                    <!-- Available projects dropdown -->
                </select>
                <button onclick="addProjectPreference()" class="button btn-sm">Add Project Choice</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/mock-db.js"></script>
    <script>
        const student = MockDB.getCurrentStudent();
        if (!student) {
            window.location.href = '../index.html?msg=AUTHENTICATION REQUIRED';
        }

        // Fill user details
        document.getElementById('span_id').innerText = student.student_id;
        document.getElementById('span_name').innerText = `${student.first_name} ${student.last_name}`;
        document.getElementById('span_cpi').innerText = student.cpi;

        function loadDashboard() {
            loadGroupInfo();
            loadProjectChoices();
        }

        // Group Management Logic
        function loadGroupInfo() {
            const groups = MockDB.getGroups();
            const students = MockDB.getStudents();
            
            // Find student's group
            let myGroup = groups.find(g => g.members.includes(student.student_id));
            if (!myGroup) {
                // Auto create self-group if none exists
                myGroup = { leader: student.student_id, members: [student.student_id], choices: [] };
                groups.push(myGroup);
                MockDB.setGroups(groups);
            }

            const isLeader = myGroup.leader === student.student_id;
            let html = `<p><strong>Group Leader:</strong> ${myGroup.leader === student.student_id ? 'You' : myGroup.leader}</p>`;
            html += `<p><strong>Group Members:</strong></p><ul class="member-list">`;
            
            myGroup.members.forEach(memberId => {
                const mem = students.find(s => s.student_id === memberId);
                const name = mem ? `${mem.first_name} ${mem.last_name}` : 'Unknown';
                html += `
                    <li class="member-item">
                        <span>${name} (${memberId})</span>
                        ${isLeader && memberId !== student.student_id ? `<button onclick="removeMember('${memberId}')" class="button btn-sm" style="background: red;">Remove</button>` : ''}
                    </li>
                `;
            });
            html += `</ul>`;
            document.getElementById('groupState').innerHTML = html;
        }

        function addMember() {
            const memberIdInput = document.getElementById('newMemberId');
            const targetId = memberIdInput.value.trim();
            if (!targetId) return;

            const students = MockDB.getStudents();
            const targetStudent = students.find(s => s.student_id === targetId);

            if (!targetStudent) {
                showMsg("Student ID not found.", true);
                return;
            }

            const groups = MockDB.getGroups();
            let myGroup = groups.find(g => g.members.includes(student.student_id));
            
            if (myGroup.leader !== student.student_id) {
                showMsg("Only the group leader can add members.", true);
                return;
            }

            if (myGroup.members.includes(targetId)) {
                showMsg("Student is already in your group.", true);
                return;
            }

            // Check if student is already in another group
            let otherGroupIndex = groups.findIndex(g => g.members.includes(targetId) && g.leader !== targetId);
            if (otherGroupIndex !== -1) {
                showMsg("Student is already in another group.", true);
                return;
            }

            // If target had a self group, remove it
            const targetSelfGroupIdx = groups.findIndex(g => g.leader === targetId && g.members.length <= 1);
            if (targetSelfGroupIdx !== -1) {
                groups.splice(targetSelfGroupIdx, 1);
            }

            myGroup.members.push(targetId);
            MockDB.setGroups(groups);
            memberIdInput.value = '';
            showMsg("Member added successfully!");
            loadDashboard();
        }

        function removeMember(memberId) {
            const groups = MockDB.getGroups();
            let myGroup = groups.find(g => g.members.includes(student.student_id));
            if (myGroup.leader !== student.student_id) {
                showMsg("Only the leader can remove members.", true);
                return;
            }

            myGroup.members = myGroup.members.filter(m => m !== memberId);
            
            // Create a self group for the removed member
            groups.push({ leader: memberId, members: [memberId], choices: [] });
            
            MockDB.setGroups(groups);
            showMsg("Member removed.");
            loadDashboard();
        }

        // Project Selection Logic
        let dragSource = null;

        function loadProjectChoices() {
            const groups = MockDB.getGroups();
            const myGroup = groups.find(g => g.members.includes(student.student_id));
            const allProjects = MockDB.getProjects();
            
            // Render selected choices
            const selectedListEl = document.getElementById('selectedProjects');
            selectedListEl.innerHTML = '';
            
            myGroup.choices.forEach((projId, index) => {
                const proj = allProjects.find(p => p.project_id === projId);
                if (proj) {
                    const li = document.createElement('li');
                    li.className = 'project-item';
                    li.draggable = true;
                    li.innerHTML = `
                        <span><strong>#${index + 1}</strong>: ${proj.definition} (ID: ${projId})</span>
                        <button onclick="removeProjectChoice('${projId}')" class="button btn-sm" style="background: red;">Delete</button>
                    `;
                    // Drag and drop event listeners
                    li.addEventListener('dragstart', (e) => {
                        dragSource = li;
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/html', li.innerHTML);
                        li.style.opacity = '0.5';
                    });
                    li.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        return false;
                    });
                    li.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (dragSource !== li) {
                            // Swap positions in group choices
                            const draggedIndex = myGroup.choices.indexOf(projId);
                            const sourceProjId = dragSource.innerText.match(/\(ID: (.*?)\)/)[1];
                            const sourceIndex = myGroup.choices.indexOf(sourceProjId);
                            
                            myGroup.choices.splice(sourceIndex, 1);
                            myGroup.choices.splice(draggedIndex, 0, sourceProjId);
                            
                            MockDB.setGroups(groups);
                            loadDashboard();
                        }
                    });
                    li.addEventListener('dragend', () => {
                        li.style.opacity = '1';
                    });
                    selectedListEl.appendChild(li);
                }
            });

            // Populate available dropdown
            const dropdown = document.getElementById('availProjectsDropdown');
            dropdown.innerHTML = '';
            allProjects.forEach(proj => {
                if (!myGroup.choices.includes(proj.project_id)) {
                    const opt = document.createElement('option');
                    opt.value = proj.project_id;
                    opt.innerText = `${proj.definition} (${proj.project_id})`;
                    dropdown.appendChild(opt);
                }
            });
        }

        function addProjectPreference() {
            const dropdown = document.getElementById('availProjectsDropdown');
            const selectedProjId = dropdown.value;
            if (!selectedProjId) return;

            const groups = MockDB.getGroups();
            const myGroup = groups.find(g => g.members.includes(student.student_id));
            
            myGroup.choices.push(selectedProjId);
            MockDB.setGroups(groups);
            showMsg("Project added to choices!");
            loadDashboard();
        }

        function removeProjectChoice(projId) {
            const groups = MockDB.getGroups();
            const myGroup = groups.find(g => g.members.includes(student.student_id));
            
            myGroup.choices = myGroup.choices.filter(c => c !== projId);
            MockDB.setGroups(groups);
            showMsg("Project preference removed.");
            loadDashboard();
        }

        function showMsg(txt, isError = false) {
            const el = document.getElementById('globalMsg');
            el.innerText = txt;
            el.style.color = isError ? '#ff6b6b' : '#84fab0';
            setTimeout(() => el.innerText = '', 4000);
        }

        function handleLogout() {
            MockDB.logout();
            window.location.href = '../index.html';
        }

        // Initialize dashboard
        loadDashboard();
    </script>
</body>
</html>
